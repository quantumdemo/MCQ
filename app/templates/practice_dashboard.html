{% extends "base.html" %}
{% block content %}
<style>
    /* Practice Mode Container */
    .practice-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .practice-card {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
    }

    .practice-header {
        padding: 1.5rem;
        border-bottom: 1px solid #eee;
        text-align: center;
    }

    .practice-header h2 {
        margin-bottom: 0.5rem;
    }

    .practice-header p {
        position: relative;
        margin-bottom: 0;
    }

    .question-count {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius);
        font-size: 0.8rem;
        font-weight: 500;
    }

    /* Form Styles */
    .practice-body {
        padding: 1.5rem;
    }

    .practice-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-label {
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-select, .form-input {
        padding: 0.8rem 1rem;
        border: 1px solid #ddd;
        border-radius: var(--radius);
        font-size: 1rem;
        transition: var(--transition);
        background-color: var(--light);
        width: 100%;
        -webkit-appearance: none; /* For WebKit browsers (Chrome, Safari) */
        -moz-appearance: none;    /* For Firefox */
        appearance: none;         /* Standard property */
    }

    .form-select:focus, .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(208, 27, 32, 0.2);
    }

    .form-input[type="number"] {
        appearance: textfield;
    }

    .form-input[type="number"]::-webkit-outer-spin-button,
    .form-input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    /* Submit Button */
    .submit-button {
        border: none;
        padding: 0.9rem;
        border-radius: var(--radius);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        margin-top: 0.5rem;
    }

    .submit-button:hover {
        background-color: var(--primary-dark);
        transform: translateY(-2px);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .practice-container {
            padding: 0 1rem;
        }
        
        .practice-header {
            padding: 1rem;
        }
        
        .practice-body {
            padding: 1rem;
        }
        
        .question-count {
            position: static;
            transform: none;
            display: inline-block;
            margin-top: 0.5rem;
        }
    }

    @media (max-width: 480px) {
        .form-select, .form-input {
            padding: 0.7rem;
        }
    } 
</style>
<section class="practice-container">
    <div class="practice-card">
        <div class="practice-header">
            <h2 class="color1">Practice Mode</h2>
            <p class="color13">Create a custom quiz to practice your skills.
                <span class="question-count color10-bg color9">Total Questions in Bank: {{ question_count }}</span>
            </p>
        </div>
        
        <div class="practice-body">
            <form method="GET" action="{{ url_for('main.start_practice') }}" class="practice-form">
                <div class="form-group">
                    <label for="subject" class="form-label color13">Filter by Subject</label>
                    <select name="subject" id="subject" class="form-select">
                        <option value="all">All Subjects</option>
                        {% for subject in subjects %}
                        <option value="{{ subject }}">{{ subject }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="topic" class="form-label color13">Filter by Topic</label>
                    <select name="topic" id="topic" class="form-select">
                        <option value="all">All Topics</option>
                        {% for topic in topics %}
                        <option value="{{ topic }}">{{ topic }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="num_questions" class="form-label color13">Number of Questions</label>
                    <input type="number" name="num_questions" id="num_questions" class="form-input" value="10" min="5" max="50">
                </div>
                
                <button type="submit" class="submit-button color1-bg color9">Start Practice Quiz</button>
            </form>
        </div>
    </div>
</section>
{% endblock content %}
